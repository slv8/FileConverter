[tool.black]
line-length = 120
include = '\.pyi?$'
target-version = ['py312']
exclude = """
/(
    .git|.cache|.venv
)/"""

[tool.isort]
multi_line_output = 3
line_length = 120
include_trailing_comma = true
use_parentheses = true
force_grid_wrap = 0
skip = [".venv"]

[tool.flake8]
max-line-length = 120
exclude = [
    ".git",
    "__pycache__",
    "build",
    "dist",
    ".venv",
    "env",
    "venv",
    "migrations",
    "*/alembic/*"
]

[tool.mypy]
disallow_untyped_defs=true